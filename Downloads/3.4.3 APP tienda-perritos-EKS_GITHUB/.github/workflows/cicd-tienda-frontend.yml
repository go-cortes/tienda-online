name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"

env:
  ECR_REGISTRY: 277070702488.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO_FRONTEND: tienda-frontend
  EKS_NAMESPACE: tienda

jobs:
  build-push-deploy-frontend:
    name: Build, Push y Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build imagen Frontend y push a ECR
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG
          echo "✅ Frontend image pushed: $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG"

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Conectar al cluster EKS
        run: |
          aws eks update-kubeconfig --region us-east-1 --name tienda
          echo "✅ Conectado a tienda"

      - name: Deploy Frontend en EKS
        run: |
          kubectl apply -f k8s/frontend-deployment.yaml -n $EKS_NAMESPACE
          kubectl apply -f k8s/frontend-service.yaml -n $EKS_NAMESPACE
          kubectl set image deployment/tienda-frontend \
            frontend=$ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG \
            -n $EKS_NAMESPACE
          kubectl rollout status deployment/tienda-frontend -n $EKS_NAMESPACE --timeout=120s
          echo "✅ Frontend actualizado - tag: $IMAGE_TAG"

      - name: Ver URL del Frontend (LoadBalancer)
        run: |
          kubectl get pods -n $EKS_NAMESPACE -l app=tienda-frontend
          echo "🌐 URL publica:"
          kubectl get svc tienda-frontend -n $EKS_NAMESPACE \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          echo ""
